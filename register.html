<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভর্তি আবেদন | Phone Rescue Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0b0f19; }
        .neon-glow { box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="text-gray-200 selection:bg-orange-500 selection:text-white">

    <!-- Background decorative blur elements -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-orange-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute top-1/2 right-10 w-96 h-96 bg-blue-500/5 rounded-full blur-[150px] pointer-events-none"></div>

    <!-- Navigation (Sleek Glassmorphism) -->
    <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800/80">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H13.5M10.5 1.5C10.5 2.32843 11.1716 3 12 3C12.8284 3 13.5 2.32843 13.5 1.5M10.5 1.5C10.5 0.671573 11.1716 0 12 0C12.8284 0 13.5 0.671573 13.5 1.5M12 21H12.01M16.5 1.5H18C19.6569 1.5 21 2.84315 21 4.5V19.5C21 21.1569 19.6569 22.5 18 22.5H6C4.34315 22.5 3 21.1569 3 19.5V4.5C3 2.84315 4.34315 1.5 6 1.5H7.5M12 6V15M9 9H15M12 18H12.01"></path>
                </svg>
                <span class="text-2xl font-black bg-gradient-to-r from-orange-500 to-amber-400 bg-clip-text text-transparent">Phone Rescue <span class="text-white">Lab</span></span>
            </div>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-semibold tracking-wide">
                <a href="index.html" class="text-gray-300 hover:text-orange-500 transition-colors">হোম</a>
                <a href="index.html#about" class="text-gray-300 hover:text-orange-500 transition-colors">কেন আমাদের ল্যাব?</a>
                <a href="courses.html" class="text-gray-300 hover:text-orange-500 transition-colors">কোর্সসমূহ</a>
                <a href="register.html" class="text-orange-500 transition-colors">ভর্তি আবেদন</a>
            </nav>
        </div>
    </header>

    <!-- Registration Form Section -->
    <section class="py-24 px-6 relative">
        <div class="container mx-auto max-w-lg relative z-10">
            <!-- Glass Form Container with Glow -->
            <div class="bg-gradient-to-b from-slate-900 to-slate-950 p-8 md:p-10 rounded-3xl border border-slate-800/80 shadow-2xl neon-glow">
                <h2 class="text-3xl font-extrabold text-center text-white mb-2">স্টুডেন্ট রেজিস্ট্রেশন</h2>
                <p class="text-center text-gray-400 text-sm mb-8">Phone Rescue Lab-এ সিট বুকিংয়ের জন্য আবেদন ফরমটি পূরণ করুন।</p>
                
                <form action="#" method="POST" class="space-y-5">
                    <!-- Name -->
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">শিক্ষার্থীর নাম (পূর্ণ নাম)</label>
                        <input type="text" name="student_name" required placeholder="উদাঃ মোঃ সাকিব হাসান" class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all placeholder:text-gray-600">
                    </div>

                    <!-- Phone Number -->
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">মোবাইল নম্বর</label>
                        <input type="tel" name="phone" required placeholder="উদাঃ 017XXXXXXXX" class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all placeholder:text-gray-600">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">ইমেইল এড্রেস (ঐচ্ছিক)</label>
                        <input type="email" name="email" placeholder="উদাঃ user@domain.com" class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all placeholder:text-gray-600">
                    </div>

                    <!-- Select Course -->
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">পছন্দের কোর্স</label>
                        <select name="course" required class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-slate-950">
                            <option value="" class="text-gray-500">সিলেক্ট করুন...</option>
                            <option value="basic-advance" class="text-white">বেসিক টু অ্যাডভান্সড মোবাইল রিপেয়ারিং</option>
                            <option value="chip-level" class="text-white">চিপ লেভেল অ্যান্ড ইএমএমসি (eMMC) কোর্স</option>
                        </select>
                    </div>

                    <!-- Address -->
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">বর্তমান ঠিকানা</label>
                        <textarea name="address" rows="3" required placeholder="আপনার সম্পূর্ণ ঠিকানা লিখুন..." class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all placeholder:text-gray-600"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-2">
                        <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-extrabold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-[0_0_20px_rgba(249,115,22,0.4)] hover:brightness-110 active:scale-[0.98] transition-all duration-200">
                            আবেদনপত্র জমা দিন
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-slate-950 text-gray-500 py-12 text-center border-t border-slate-900">
        <div class="container mx-auto px-6">
            <span class="text-lg font-bold bg-gradient-to-r from-orange-500 to-amber-400 bg-clip-text text-transparent block mb-4">Phone Rescue Lab</span>
            <p class="text-xs text-gray-600">&copy; 2026 Phone Rescue Lab. সর্বস্বত্ব সংরক্ষিত।</p>
        </div>
    </footer>

    <!-- Supabase Integration (JS) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // এখানে আপনার Supabase URL বসাবেন
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // এখানে আপনার Supabase Anon Key বসাবেন

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.querySelector('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "আবেদন জমা হচ্ছে...";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const student_name = formData.get('student_name');
            const phone = formData.get('phone');
            const email = formData.get('email');
            const course = formData.get('course');
            const address = formData.get('address');

            const { data, error } = await supabaseClient
                .from('registrations')
                .insert([
                    { student_name, phone, email, course, address }
                ]);

            if (error) {
                alert('দুঃখিত! কোনো ত্রুটি হয়েছে। দয়া করে আবার চেষ্টা করুন।');
                console.error('Error:', error);
            } else {
                alert('অভিনন্দন! আপনার আবেদনটি সফলভাবে Phone Rescue Lab-এ জমা হয়েছে।');
                form.reset();
            }

            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
